name: DevView Read Model Evidence

on:
  pull_request:
    paths:
      - cli/**
      - docs/concept/**
      - examples/valid/**
      - schemas/**
      - scripts/**
      - package.json
      - package-lock.json
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:devview
      - run: npm run test:read-model:e2e
